#=============================
# Ball Devices
#=============================      
ball_devices:

  bd_trough:
    ball_switches: s_trough_ball_1, s_trough_ball_2, s_trough_ball_3, s_trough_ball_4, s_trough_ball_5, s_trough_ball_6, s_trough_ball_7, s_trough_ball_8
    tags: trough, home, drain
    eject_coil: c_trough_eject
    eject_coil_jam_pulse: 15ms
    eject_targets: bd_plunger
    eject_timeouts: 2s
    max_eject_attempts: 3

  bd_plunger:
    ball_switches: s_plunger
    eject_coil: c_auto_kicker
    mechanical_eject: true
    eject_timeouts: 5s

virtual_platform_start_active_switches:
  - s_trough_ball_1
  - s_trough_ball_2
  - s_trough_ball_3
  - s_trough_ball_4
  - s_trough_ball_5
  - s_trough_ball_6
  - s_trough_ball_7
  - s_trough_ball_8

#=============================
# Shakers
#=============================  
shakers:
  main_shaker:
    number: shakerboard-1
    debug: true
    default_power: 0.5
    control_events:
      shake_shake_shake:
        power: 0.5
        duration: 3s      
