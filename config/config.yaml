  - lights.yaml
  - coils.yaml
  - switches.yaml
  - variables.yaml

#=============================
# Modes
#=============================
modes:
  #- base
  - attract
  #- char_select
  #- mode_1

#=============================
# Flippers
#=============================
flippers:
  flipper_lower_left:
    main_coil: c_lower_left_flipper_main
    hold_coil: c_lower_left_flipper_hold
    activation_switch: s_lower_left_flipper
    eos_switch: s_lower_left_flipper_eos
    enable_events: ball_started
    disable_events: ball_will_end, service_mode_entered
  #right_flipper:
