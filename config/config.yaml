#config_version=6

hardware:
    platform: fast

fast:
  net:
    controller: neuron
    port: auto
    io_loop:
      cabinet:
        model: FP-I/O-0024
        order: 1
      playfield:
        model: FP-I/O-3208
        order: 2

  exp:
    debug: true
    port: auto
    boards:
      shakerboard:
        model: FP-EXP-1313
      neuron:
        model: FP-EXP-2000


