  s_lower_left_flipper_active: # Must match your show_player event key exactly
    thunder_strike:
      volume: 0.9          # Sets playback volume (0.0 to 1.0 scale)
      priority: 100        # High priority prevents background music from clipping it
  s_lower_right_flipper_active: # Must match your show_player event key exactly
