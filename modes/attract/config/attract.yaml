#config_version=6
#attract mode config file

slide_player:
  mode_attract_started: joe_ros_intro

  mode_attract_stopping:
    joe_ros_intro:
      action: remove

show_player:
    mode_attract_started:
      blinking_start:
        loops: -1
        
light_player:
  mode_attract_started:
    l_left_rail:
      color: white
    l_right_rail:
      color: white
                 
event_player:
  mode_attract_started: enable_storm_shadow
  s_lower_left_flipper_active: activate_storm_shadow
  s_lower_right_flipper_active: deactivate_storm_shadow
  
