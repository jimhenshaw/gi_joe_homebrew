#config_version=6
#attract mode config file

slide_player:
  mode_attract_started: joe_ros_intro

  mode_attract_stopping:
    joe_ros_intro:
      action: remove

show_player:
  mode_attract_started:
    blinking_start:
      loops: -1
    group_patriotic_rotation:
      loops: -1         # Infinite looping
      speed: 1         # Normal playback speed
      show_tokens:
        group_a: right_group_a
        group_b: right_group_b
        group_c: right_group_c
    group_cobra_rotation:
      loops: -1         # Infinite looping
      speed: 1         # Normal playback speed
      show_tokens:
        group_a: left_group_a
        group_b: left_group_b
        group_c: left_group_c
  s_lower_left_flipper_active:
    rails_lightning_strike:
      loops: 2         # Infinite looping
      speed: 1         # Normal playback speed
      priority: 100
      show_tokens:
        group_a: group_a
        group_b: group_b
        group_c: group_c
  s_lower_right_flipper_active:
    rails_wave_pulse:
      loops: 0       # Infinite loop while the mode is active
      speed: 1.0      # Set to 2.0 if you want a much faster, rushing wave
      priority: 100
      show_tokens:
        p1: l_left_rail_32, l_left_rail_33, l_right_rail_32, l_right_rail_33
        p2: l_left_rail_31, l_left_rail_34, l_right_rail_31, l_right_rail_34
        p3: l_left_rail_30, l_left_rail_35, l_right_rail_30, l_right_rail_35
