#show_version=6

# Rotates a Red, White, and Blue pattern down the rails 3 times per second.
# Step duration: 0.111s per step (3 steps total = ~0.333s full cycle)

- time: 0
  lights:
    (group_a): 
      color: 440126 # Red
      fade: 0.111
    (group_b): 
      color: 680A3B # Purple
      fade: 0.111
    (group_c): 
      color: 27295C # Blue
      fade: 0.111

- time: 0.111
  lights:
    (group_a): 
      color: 680A3B # Purple
      fade: 0.111
    (group_b): 
      color: 27295C # Fade to Blue
      fade: 0.111
    (group_c): 
      color: 440126 # Fade to Red
      fade: 0.111

- time: 0.222
  lights:
    (group_a): 
      color: 27295C # Fade to Blue
      fade: 0.111
    (group_b): 
      color: 440126 # Fade to Red
      fade: 0.111
    (group_c): 
      color: 680A3B # Purple
      fade: 0.111

- time: 0.333
